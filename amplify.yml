version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - rm -f .env.production
        - env | grep -e '^LITECARD_' -e '^SF_' -e '^POSTMARK_' -e '^WORKER_CONCURRENCY=' -e '^MAX_BATCH_SIZE=' >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
